# Netlify deployment configuration for the StudyFlow client.

[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to the live Render backend so the deployed front-end is
# same-origin with its API. This means you do NOT have to edit the API's
# CORS allow-list for the Netlify domain.
[[redirects]]
  from = "/api/*"
  to = "https://studyflow-api-yzno.onrender.com/api/:splat"
  status = 200
  force = true

# Single-page-app fallback: every other route serves index.html so React
# Router can handle it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (added in Assignment 3 after an OWASP ZAP baseline scan
# reported missing anti-clickjacking and Content-Security-Policy headers on the
# static front-end). The API already sets equivalent headers via helmet; these
# bring the front-end tier up to the same standard.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' https://studyflow-api-yzno.onrender.com; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
