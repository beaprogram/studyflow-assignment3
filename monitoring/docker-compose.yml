# Monitoring stack for StudyFlow: Prometheus scrapes the API's /metrics
# endpoint, Grafana queries Prometheus and draws the dashboard.
#
# Start:  cd monitoring && docker compose up -d
# Stop:   docker compose down
#
# Prometheus UI: http://localhost:9090
# Grafana UI:    http://localhost:3000  (login admin / admin)

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: studyflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    extra_hosts:
      # Colima does not provide host.docker.internal by default the way Docker
      # Desktop does, so map it explicitly to the container's gateway.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: studyflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      # Provisioning: Grafana wires up the Prometheus data source on startup,
      # so the dashboard works without any manual clicking.
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/studyflow.yml:ro
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/studyflow.json:ro
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
