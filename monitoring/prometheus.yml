# Prometheus scrape configuration for StudyFlow.
#
# Prometheus runs in a container, so "localhost" here would mean the container
# itself. host.docker.internal resolves to the Docker host (the Mac running the
# API), which is where the StudyFlow API listens on port 5050.

global:
  scrape_interval: 5s      # poll often enough to see load-test spikes
  evaluation_interval: 15s
  external_labels:
    monitor: 'studyflow'

scrape_configs:
  # The StudyFlow API's own instrumentation (prom-client on /metrics).
  - job_name: 'studyflow-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:5050']
        labels:
          service: 'api'

  # Prometheus scraping itself, useful for confirming the stack is healthy.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
